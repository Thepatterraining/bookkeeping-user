<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录认证架构UML类图</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .diagram-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="diagram-container">
    <svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景 -->
        <rect width="1400" height="900" fill="#ffffff"/>

        <!-- 标题 -->
        <text x="700" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
            登录认证架构UML类图
        </text>

        <!-- 左侧分层标识 -->
        <g id="layers">
            <!-- 接口层 -->
            <rect x="20" y="60" width="120" height="180" rx="8" fill="#4A90E2" opacity="0.1" stroke="#4A90E2"/>
            <text x="80" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A90E2">接口层</text>

            <!-- 应用层 -->
            <rect x="20" y="260" width="120" height="280" rx="8" fill="#50C878" opacity="0.1" stroke="#50C878"/>
            <text x="80" y="400" text-anchor="middle" font-size="16" font-weight="bold" fill="#50C878">应用层</text>

            <!-- 领域层 -->
            <rect x="20" y="560" width="120" height="300" rx="8" fill="#FF8C42" opacity="0.1" stroke="#FF8C42"/>
            <text x="80" y="710" text-anchor="middle" font-size="16" font-weight="bold" fill="#FF8C42">领域层</text>
        </g>

        <!-- 接口层 - AuthController -->
        <g id="controller">
            <rect x="180" y="80" width="240" height="140" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
            <text x="300" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976D2">AuthController</text>
            <line x1="180" y1="125" x2="420" y2="125" stroke="#1976D2"/>
            <text x="190" y="145" font-size="13" fill="#333">+ login(AuthRequest): AuthResponse</text>
            <text x="190" y="165" font-size="13" fill="#333">+ logout(String): void</text>
            <text x="190" y="185" font-size="13" fill="#333">+ refresh(String): AuthResponse</text>
            <text x="190" y="205" font-size="13" fill="#333">+ register(RegisterRequest): User</text>
        </g>

        <!-- 应用层 - AuthenticationFacade -->
        <g id="facade">
            <rect x="180" y="280" width="260" height="120" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="310" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthenticationFacade</text>
            <line x1="180" y1="325" x2="440" y2="325" stroke="#388E3C"/>
            <text x="190" y="345" font-size="13" fill="#333">- strategyFactory: AuthStrategyFactory</text>
            <text x="190" y="365" font-size="13" fill="#333">- userService: UserService</text>
            <line x1="180" y1="375" x2="440" y2="375" stroke="#388E3C"/>
            <text x="190" y="392" font-size="13" fill="#333">+ authenticate(AuthRequest): AuthResponse</text>
        </g>

        <!-- 应用层 - AuthStrategyFactory -->
        <g id="factory">
            <rect x="480" y="280" width="280" height="120" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="620" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthStrategyFactory</text>
            <line x1="480" y1="325" x2="760" y2="325" stroke="#388E3C"/>
            <text x="490" y="345" font-size="13" fill="#333">- strategies: Map&lt;AuthType, AuthStrategy&gt;</text>
            <line x1="480" y1="355" x2="760" y2="355" stroke="#388E3C"/>
            <text x="490" y="375" font-size="13" fill="#333">+ getStrategy(AuthType): AuthStrategy</text>
            <text x="490" y="392" font-size="13" fill="#333">+ register(AuthType, AuthStrategy): void</text>
        </g>

        <!-- DTOs -->
        <g id="dtos">
            <rect x="800" y="280" width="200" height="100" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="900" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthRequest</text>
            <line x1="800" y1="325" x2="1000" y2="325" stroke="#388E3C"/>
            <text x="810" y="345" font-size="13" fill="#333">+ authType: AuthType</text>
            <text x="810" y="365" font-size="13" fill="#333">+ credentials: Map&lt;String, Object&gt;</text>

            <rect x="1040" y="280" width="200" height="120" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="1140" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthResponse</text>
            <line x1="1040" y1="325" x2="1240" y2="325" stroke="#388E3C"/>
            <text x="1050" y="345" font-size="13" fill="#333">+ success: boolean</text>
            <text x="1050" y="365" font-size="13" fill="#333">+ token: String</text>
            <text x="1050" y="385" font-size="13" fill="#333">+ user: User</text>
        </g>

        <!-- 应用层 - AuthContext -->
        <g id="context">
            <rect x="480" y="430" width="200" height="100" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="580" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthContext</text>
            <line x1="480" y1="475" x2="680" y2="475" stroke="#388E3C"/>
            <text x="490" y="495" font-size="13" fill="#333">+ userId: String</text>
            <text x="490" y="515" font-size="13" fill="#333">+ authInfo: Map&lt;String, Object&gt;</text>
        </g>

        <!-- 领域层 - AuthStrategy接口 -->
        <g id="interface">
            <rect x="480" y="580" width="280" height="100" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
            <text x="620" y="605" text-anchor="middle" font-size="14" font-style="italic" fill="#E65100">&lt;&lt;interface&gt;&gt;</text>
            <text x="620" y="625" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">AuthStrategy</text>
            <line x1="480" y1="635" x2="760" y2="635" stroke="#E65100"/>
            <text x="490" y="655" font-size="13" fill="#333">+ authenticate(AuthContext): AuthResult</text>
            <text x="490" y="672" font-size="13" fill="#333">+ supports(AuthType): boolean</text>
        </g>

        <!-- 领域层 - 具体策略实现 -->
        <g id="strategies">
            <!-- 用户名密码策略 -->
            <rect x="180" y="720" width="240" height="100" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
            <text x="300" y="750" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">UsernamePasswordStrategy</text>
            <line x1="180" y1="765" x2="420" y2="765" stroke="#E65100"/>
            <text x="190" y="785" font-size="13" fill="#333">- userRepository: UserRepository</text>
            <text x="190" y="805" font-size="13" fill="#333">- passwordEncoder: PasswordEncoder</text>

            <!-- 手机验证码策略 -->
            <rect x="460" y="720" width="240" height="100" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
            <text x="580" y="750" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">SmsCodeStrategy</text>
            <line x1="460" y1="765" x2="700" y2="765" stroke="#E65100"/>
            <text x="470" y="785" font-size="13" fill="#333">- smsService: SmsService</text>
            <text x="470" y="805" font-size="13" fill="#333">- cacheService: CacheService</text>

            <!-- 微信策略 -->
            <rect x="740" y="720" width="240" height="100" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
            <text x="860" y="750" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">WechatOpenIdStrategy</text>
            <line x1="740" y1="765" x2="980" y2="765" stroke="#E65100"/>
            <text x="750" y="785" font-size="13" fill="#333">- wechatService: WechatService</text>
            <text x="750" y="805" font-size="13" fill="#333">- userBindingService: UserBindingService</text>

            <!-- 扩展策略 -->
            <rect x="1020" y="720" width="220" height="100" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2" stroke-dasharray="5,5"/>
            <text x="1130" y="750" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">OtherStrategy</text>
            <line x1="1020" y1="765" x2="1240" y2="765" stroke="#E65100" stroke-dasharray="5,5"/>
            <text x="1030" y="785" font-size="13" font-style="italic" fill="#999">// 未来扩展其他登录方式</text>
            <text x="1030" y="805" font-size="13" font-style="italic" fill="#999">// 如：Github、QQ等</text>
        </g>

        <!-- 领域层 - User实体 -->
        <g id="user">
            <rect x="1040" y="440" width="200" height="140" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
            <text x="1140" y="470" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">User</text>
            <line x1="1040" y1="485" x2="1240" y2="485" stroke="#E65100"/>
            <text x="1050" y="505" font-size="13" fill="#333">+ userId: String</text>
            <text x="1050" y="525" font-size="13" fill="#333">+ username: String</text>
            <text x="1050" y="545" font-size="13" fill="#333">+ phone: String</text>
            <text x="1050" y="565" font-size="13" fill="#333">+ openIds: Map&lt;String, String&gt;</text>
        </g>

        <!-- 枚举 -->
        <g id="enum">
            <rect x="800" y="440" width="200" height="120" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
            <text x="900" y="465" text-anchor="middle" font-size="14" font-style="italic" fill="#388E3C">&lt;&lt;enumeration&gt;&gt;</text>
            <text x="900" y="485" text-anchor="middle" font-size="16" font-weight="bold" fill="#388E3C">AuthType</text>
            <line x1="800" y1="495" x2="1000" y2="495" stroke="#388E3C"/>
            <text x="810" y="515" font-size="13" fill="#333">USERNAME_PASSWORD</text>
            <text x="810" y="535" font-size="13" fill="#333">SMS_CODE</text>
            <text x="810" y="555" font-size="13" fill="#333">WECHAT_OPENID</text>
        </g>

        <!-- 关系连线 -->
        <!-- Controller 到 Facade -->
        <line x1="300" y1="220" x2="300" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

        <!-- Facade 到 Factory -->
        <line x1="440" y1="340" x2="480" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

        <!-- Factory 到 Interface -->
        <line x1="620" y1="400" x2="620" y2="580" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

        <!-- 策略实现到接口 -->
        <line x1="300" y1="720" x2="300" y2="650" stroke="#666" stroke-width="2"/>
        <line x1="300" y1="650" x2="480" y2="650" stroke="#666" stroke-width="2"/>
        <line x1="480" y1="650" x2="480" y2="630" stroke="#666" stroke-width="2" marker-end="url(#triangle)"/>

        <line x1="580" y1="720" x2="580" y2="680" stroke="#666" stroke-width="2" marker-end="url(#triangle)"/>

        <line x1="860" y1="720" x2="860" y2="650" stroke="#666" stroke-width="2"/>
        <line x1="860" y1="650" x2="760" y2="650" stroke="#666" stroke-width="2"/>
        <line x1="760" y1="650" x2="760" y2="630" stroke="#666" stroke-width="2" marker-end="url(#triangle)"/>

        <line x1="1130" y1="720" x2="1130" y2="650" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="1130" y1="650" x2="760" y2="650" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

        <!-- 定义箭头 -->
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                <polygon points="0 0, 10 5, 0 10" fill="#666"/>
            </marker>
            <marker id="triangle" markerWidth="15" markerHeight="15" refX="15" refY="7.5" orient="auto">
                <polygon points="0 0, 15 7.5, 0 15" fill="none" stroke="#666" stroke-width="2"/>
            </marker>
        </defs>
    </svg>
</div>
</body>
</html>
